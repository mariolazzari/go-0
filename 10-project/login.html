<!doctype html>
<html lang="it">
  <head>
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form action="/login" method="post">
      Email: <input type="email" name="email" required /> Password:<input
        type="password"
        name="password"
        required
      />
      <input type="submit" value="Login" />
    </form>

    <h1>Registrazione</h1>
    <form action="/register" method="post">
      Nome: <input type="text" name="name" required /> Email:
      <input type="email" name="email" required /> Password:<input
        type="password"
        name="password"
        required
      />
      <input type="submit" value="Register" />
    </form>
  </body>
</html>
